# ============================================================
# BookShelf — Docker Compose
# ============================================================
# Required (set in .env or shell):
#   AUTH_SECRET=<run: openssl rand -base64 32>
#
# Optional (set in .env or shell):
#   AUTH_GOOGLE_ID / AUTH_GOOGLE_SECRET
#   AUTH_GITHUB_ID / AUTH_GITHUB_SECRET
#   ADMIN_EMAIL
#   GOOGLE_BOOKS_API_KEY
#   THEBOOKDB_API_KEY
#   ISBNDB_API_KEY
# ============================================================

services:
  mongo:
    image: mongo:7
    container_name: bookshelf-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookshelf-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # MongoDB — uses the mongo service on the compose network
      - MONGODB_URI=mongodb://mongo:27017/bookshelf

      # Auth.js — REQUIRED (generate with: openssl rand -base64 32)
      - AUTH_SECRET=${AUTH_SECRET}

      # App URL
      - AUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000

      # OAuth (optional)
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:-}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:-}

      # Admin
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}

      # Book metadata APIs (optional)
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
      - THEBOOKDB_API_KEY=${THEBOOKDB_API_KEY:-}
      - ISBNDB_API_KEY=${ISBNDB_API_KEY:-}

volumes:
  mongo-data:
